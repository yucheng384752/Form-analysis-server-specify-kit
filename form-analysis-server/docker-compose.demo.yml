# ============================================================================
# Docker Compose - DEMO Environment (Stable)
# ============================================================================
# 此檔案用於 DEMO/正式環境：
# - 使用 production target，代碼打包進 image
# - 不掛載源碼，更新代碼需重新 build image
# - 獨立的 volume 與 container 名稱，與開發環境隔離
# ============================================================================

services:
  # PostgreSQL Database (Demo)
  db:
    image: postgres:16
    container_name: demo_form_analysis_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong}
      POSTGRES_DB: ${POSTGRES_DB:-form_analysis_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-18101}:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-form_analysis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API Service (Demo - Production Build)
  backend:
    image: form-analysis-backend:demo
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: demo_form_analysis_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-change-me-strong}@db:5432/${POSTGRES_DB:-form_analysis_db}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=8000
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:18103,http://localhost:3001,http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=false
      - RELOAD=false
      - UPLOAD_TEMP_DIR=/app/uploads
      # Auth settings
      - AUTH_MODE=${AUTH_MODE:-api_key}
      - AUTH_API_KEY_HEADER=${AUTH_API_KEY_HEADER:-X-API-Key}
      - AUTH_PROTECT_PREFIXES=${AUTH_PROTECT_PREFIXES:-/api}
      - AUTH_EXEMPT_PATHS=${AUTH_EXEMPT_PATHS:-/healthz,/docs,/redoc,/openapi.json,/api/auth/login}
      - ADMIN_API_KEYS=${ADMIN_API_KEYS:-}
      - ADMIN_API_KEY_HEADER=${ADMIN_API_KEY_HEADER:-X-Admin-API-Key}
      # External PDF conversion server (optional)
      - PDF_SERVER_URL=${PDF_SERVER_URL:-}
      - PDF_SERVER_CONVERT_PATH=${PDF_SERVER_CONVERT_PATH:-/convert}
      - PDF_SERVER_TIMEOUT_SECONDS=${PDF_SERVER_TIMEOUT_SECONDS:-60}
      - PDF_SERVER_TABLE=${PDF_SERVER_TABLE:-}
      # External analytics (mounted read-only)
      - ANALYTICAL_FOUR_PATH=${ANALYTICAL_FOUR_PATH:-/external/Analytical-Four}
      - SEPTEMBER_V2_PATH=${SEPTEMBER_V2_PATH:-/external/september_v2}
      - ANALYTICS_CONFIG_PATH=${ANALYTICS_CONFIG_PATH:-/external/september_v2/config/ut_config_v3.json}
      - ANALYTICS_MERGED_CSV_PATH=${ANALYTICS_MERGED_CSV_PATH:-/external/september_v2/merged_p1_p2_p3.csv}
    ports:
      - "${HOST_API_PORT:-18102}:8000"
    volumes:
      # Demo 環境不掛載源碼，只掛載必要的資料目錄
      - upload_demo_data:/app/uploads
      - ${SEPTEMBER_V2_HOST_PATH:-C:/Users/yucheng/Desktop/september_v2}:/external/september_v2:ro
      - ${ANALYTICAL_FOUR_HOST_PATH:-C:/Users/yucheng/Desktop/Analytical/Analytical-Four}:/external/Analytical-Four:ro
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Frontend Service (Demo - Production Build with Nginx)
  frontend:
    image: form-analysis-frontend:demo
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_URL=${VITE_API_URL:-http://127.0.0.1:18102}
        - VITE_MAX_FILE_SIZE=${VITE_MAX_FILE_SIZE:-10485760}
        - VITE_ENABLE_CSV_EDIT=${VITE_ENABLE_CSV_EDIT:-true}
        - VITE_API_KEY=${VITE_API_KEY:-}
        - VITE_API_KEY_HEADER=${VITE_API_KEY_HEADER:-X-API-Key}
    container_name: demo_form_analysis_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-18103}:80"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # pgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: demo_form_analysis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-change-me-strong}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-18104}:80"
    volumes:
      - pgadmin_demo_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - demo-network
    profiles:
      - tools

# Persistent data volumes (Demo - 獨立於開發環境)
volumes:
  postgres_demo_data:
    driver: local
  upload_demo_data:
    driver: local
  pgadmin_demo_data:
    driver: local

# Network for service communication (Demo)
networks:
  demo-network:
    driver: bridge
