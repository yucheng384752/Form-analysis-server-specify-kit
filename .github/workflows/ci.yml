name: CI

on:
  push:
    branches: ["master", "main", "wip/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Security (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: .gitleaks.toml

  backend:
    name: Backend (lint + pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            form-analysis-server/backend/requirements.txt
            form-analysis-server/backend/requirements-test.txt

      - name: Install deps
        working-directory: form-analysis-server/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt

      - name: Lint
        working-directory: form-analysis-server/backend
        run: |
          python -m ruff check app tests
          python -m ruff format --check app tests

      - name: Run tests
        working-directory: form-analysis-server/backend
        run: |
          python -m pytest

  frontend:
    name: Frontend (lint + typecheck + vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            form-analysis-server/frontend/package-lock.json

      - name: Install deps
        working-directory: form-analysis-server/frontend
        run: npm ci

      - name: Lint
        working-directory: form-analysis-server/frontend
        run: npm run lint

      - name: Type check
        working-directory: form-analysis-server/frontend
        run: npm run type-check

      - name: Unit tests
        working-directory: form-analysis-server/frontend
        env:
          CI: "true"
        run: npm run test -- --run
